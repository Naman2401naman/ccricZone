name: CI

on:
  push:
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
      - name: Run tests
        working-directory: backend
        run: ./mvnw -B test
        env:
          JWT_SECRET: not-a-base64-secret-with-32-bytes!!

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build static frontend
        working-directory: frontend
        run: npm run build
