spring.application.name=criczone-spring
server.port=${PORT:8080}
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/criczone}

app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:2592000000}
app.cache.ttl-seconds=${CACHE_TTL_SECONDS:60}
app.cache.max-entries=${CACHE_MAX_ENTRIES:500}
app.kafka.enabled=${KAFKA_ENABLED:false}
app.kafka.booking-topic=${KAFKA_BOOKING_TOPIC:criczone.booking.workflow.v1}
app.kafka.consumer-group-id=${KAFKA_CONSUMER_GROUP_ID:criczone-booking-workflow}
app.client-url=${CLIENT_URL:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5500,http://127.0.0.1:5500,capacitor://localhost,ionic://localhost}
app.allow-all-origins=${ALLOW_ALL_ORIGINS:false}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

server.error.include-message=always
server.error.include-binding-errors=always
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
